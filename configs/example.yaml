name: "GPT-4o (пример)"
base_url: "https://api.openai.com/v1"
api_key: "sk-..."
model: "gpt-4o"
system_prompt: |
  Ты — помощник для офисных задач.
  Отвечай на русском языке.
  Будь конкретным и практичным.

# Опционально: лимит вопросов (для тестового прогона)
# limit: 10

# Опционально: только определённые категории
# categories:
#   - communication
#   - ethics

# Опционально: таймаут на запрос (секунды)
# timeout: 60

# Опционально: параллельность (сколько запросов одновременно)
# concurrency: 5
